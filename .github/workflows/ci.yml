# Full CI gates (hardening C3). Runs on every push to main and every PR:
#   frontend — typecheck, production build, and `npm audit` (high+ fails)
#   rust     — clippy (-D warnings), the test suite, and `cargo audit`
# `cargo audit` / `npm audit` add the supply-chain gate the hardening pass asked
# for. cargo audit's default exit gates on real vulnerabilities while surfacing
# (not failing on) the unmaintained/unsound warnings from Tauri's transitive
# deps, which we don't control; npm audit is pinned to --audit-level=high so a
# transitive dev-only low advisory doesn't wedge CI.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Only the latest run per ref needs to finish; cancel superseded ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the jobs only read the checkout.
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck · build · audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build
      - name: Audit dependencies (high+ fails)
        run: npm audit --audit-level=high

  rust:
    name: Backend (clippy · test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit dependencies (vulnerabilities fail; warnings surface)
        run: cargo audit
